name: flutter_jira_issue_collector
description: >-
  Jira Issue Collector for Flutter. Fetch collector fields dynamically,
  show customizable forms, or submit issues programmatically in the background.
version: 0.2.0
homepage: https://tekthar.com
repository: https://github.com/nicexe/flutter_jira_issue_collector
issue_tracker: https://github.com/nicexe/flutter_jira_issue_collector/issues

topics:
  - jira
  - issue-collector
  - issue-tracking
  - feedback

environment:
  sdk: ^3.0.0
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  html: ^0.15.4

executables:
  generate_collector:
    # dart run flutter_jira_issue_collector:generate_collector

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
